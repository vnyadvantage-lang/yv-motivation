<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YV — Финмотивация команды</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.wrap{max-width:680px;width:100%;padding:2rem 1.5rem}
h1{font-size:22px;font-weight:600;margin-bottom:4px}
.sub{font-size:13px;color:#5a6278;font-family:monospace;margin-bottom:2rem}
.card{background:#161b27;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;text-decoration:none;transition:border-color .15s,background .15s}
.card:hover{background:#1e2535;border-color:rgba(255,255,255,0.15)}
.card-left{display:flex;align-items:center;gap:14px}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600}
.av-green{background:rgba(34,197,94,0.15);color:#22c55e}
.av-yellow{background:rgba(245,158,11,0.15);color:#f59e0b}
.name{font-size:15px;font-weight:500;color:#e8eaf0}
.role{font-size:12px;color:#5a6278;margin-top:2px}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.b-ready{background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.25)}
.b-wip{background:rgba(245,158,11,0.1);color:#f59e0b;border:1px solid rgba(245,158,11,0.25)}
.divider{height:1px;background:rgba(255,255,255,0.06);margin:1.5rem 0}
.footer{font-size:11px;color:#5a6278;text-align:center;font-family:monospace}
</style>
</head>
<body>
<div class="wrap">
  <h1>💰 Финмотивация команды YV</h1>
  <div class="sub">Etsy Platform · 2026 · Интерактивные калькуляторы</div>
  <a class="card" href="./lolita/">
    <div class="card-left">
      <div class="avatar av-green">L</div>
      <div><div class="name">Lolita</div><div class="role">Менеджер платформы Etsy</div></div>
    </div>
    <span class="badge b-ready">Готов →</span>
  </a>
  <a class="card" href="./sasha/" style="pointer-events:none;opacity:.5">
    <div class="card-left">
      <div class="avatar av-yellow">S</div>
      <div><div class="name">Саша</div><div class="role">— в разработке</div></div>
    </div>
    <span class="badge b-wip">Скоро</span>
  </a>
  <a class="card" href="./seryozha/" style="pointer-events:none;opacity:.5">
    <div class="card-left">
      <div class="avatar av-yellow">S</div>
      <div><div class="name">Серёжа</div><div class="role">— в разработке</div></div>
    </div>
    <span class="badge b-wip">Скоро</span>
  </a>
  <div class="divider"></div>
  <div class="footer">yv-motivation · май 2026</div>
</div>
</body>
</html>
